name: Build Android APK

on:
  push:
    branches: [ "main", "master", "Season-5" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Meal_counting_webpage

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Meal_counting_webpage/package-lock.json

      - name: List files (Debug)
        run: ls -R

      - name: Install Dependencies
        run: npm install

      - name: Capacitor Sync
        run: ./node_modules/.bin/cap sync android

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: MealManager-APK
          path: Meal_counting_webpage/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Update APK in Apps Folder
        if: success()
        run: |
          mkdir -p ../apps
          cp android/app/build/outputs/apk/debug/app-debug.apk ../apps/MealManager.apk
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ../apps/MealManager.apk
          git commit -m "chore: Update MealManager APK [skip actions]" || echo "No changes to commit"
          git push
