name: Build Android APK

on:
  push:
    branches: [ "main", "master", "Season-5" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Meal_counting_webpage

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Meal_counting_webpage/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MealManager-APK
          path: Meal_counting_webpage/android/app/build/outputs/apk/debug/app-debug.apk
